<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تاریخچه | ImageCompressor</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
    <header class="header glass">
        <!-- هدر رو کپی کن -->
    </header>

    <main class="main" style="padding-top:2rem;">
        <div class="container" style="max-width:1000px;margin:0 auto;">
            <div class="page-header">
                <h1><i class="fas fa-history"></i> تاریخچه فشرده‌سازی</h1>
                <div class="page-actions">
                    <button id="clearHistory" class="btn-danger">
                        <i class="fas fa-trash-alt"></i> پاک کردن همه
                    </button>
                </div>
            </div>
            <div id="historyList" class="history-grid">
                <!-- آیتم‌های تاریخچه اینجا توسط JS ساخته میشن -->
            </div>
            <div id="emptyHistory" class="empty-state" style="display:none;">
                <i class="fas fa-inbox"></i>
                <h3>تاریخچه خالی است</h3>
                <p>هنوز هیچ تصویری فشرده‌سازی نکرده‌اید.</p>
                <a href="index.html" class="btn-primary">رفتن به فشرده‌ساز</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <!-- فوتر رو کپی کن -->
    </footer>

    <script src="js/history.js"></script>
</body>
</html>
